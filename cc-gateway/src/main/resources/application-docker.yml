spring:
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848

jwt:
  secret: ${JWT_SECRET:cctrading-platform-secret-key-2024-docker}
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.cc.gateway: info

spring:
  cloud:
    gateway:
      routes:
        # 产品服务路由
        - id: cc-product-service
          uri: lb://cc-product-service
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
          filters:
            - StripPrefix=0